services:
  - type: web
    name: peblo-ai-notes-workspace
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_FILE
        value: /var/data/db.json
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-4.1-mini
    disk:
      name: peblo-notes-data
      mountPath: /var/data
      sizeGB: 1
